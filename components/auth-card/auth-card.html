<!-- Tekrogen · Auth card specimen (ADR-0011 reference render). Head (label + state pill) + heading + sub
     + a tk-form + footer notes. Composes tk-form / tk-field / tk-button. -->
<article class="tk-auth-card">
  <div data-tk-slot="head"><span class="lab">Sub-screen · sign in</span><span class="state-pill">anonymous</span></div>
  <h3>Sign in to Tekrogen.</h3>
  <p class="sub">A free account unlocks demo-source downloads. Paid members get product downloads, license keys, and the customer portal.</p>
  <div class="tk-form">
    <div class="tk-field"><label for="si-email">Email</label><input class="tk-input" id="si-email" type="email" placeholder="you@example.com"/></div>
    <div class="tk-field"><label for="si-pw">Password</label><input class="tk-input" id="si-pw" type="password" placeholder="••••••••••"/></div>
    <a class="tk-button" data-style="cta" data-block href="#">Sign in →</a>
    <p class="muted-line">New here? Create a free account · magic-link sign-in</p>
  </div>
  <p class="ghost-note">ghost portal · members</p>
</article>
