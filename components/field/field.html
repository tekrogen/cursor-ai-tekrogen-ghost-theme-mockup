<!-- Tekrogen · Field/form specimen (ADR-0011 reference render). .tk-form stacks .tk-field; .tk-field-row pairs two. Control = .tk-input. -->
<div class="tk-form" style="max-width:420px">
  <div class="tk-field-row">
    <div class="tk-field"><label for="fn">First name</label><input class="tk-input" id="fn" placeholder="Martinique"/></div>
    <div class="tk-field"><label for="ln">Last name</label><input class="tk-input" id="ln" placeholder="Dolce"/></div>
  </div>
  <div class="tk-field"><label for="em">Work email</label><input class="tk-input" id="em" type="email" placeholder="you@company.com"/></div>
  <a class="tk-button" data-style="cta" data-block href="#">Create free account →</a>
</div>
